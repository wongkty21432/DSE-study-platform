<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>學習進度 — DSE Study Platform</title>
<style>
  :root {
    --bg: #060b18; --surface: #0f1629; --surface2: #1a2540;
    --text: #e2e8f0; --text2: #8899b4; --accent: #38bdf8;
    --green: #4ade80; --red: #f87171; --yellow: #fbbf24;
    --purple: #c084fc; --orange: #fb923c;
    --border: #1e2d4a; --radius: 14px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 24px; display:flex; align-items:center; gap:14px; position:sticky; top:0; z-index:100; }
  .topbar h1 { font-size:1rem; background:linear-gradient(135deg,var(--accent),var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .topbar a { text-decoration:none; font-size:1.1rem; }
  .container { max-width:900px; margin:0 auto; padding:24px; }
  .subject-tabs { display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; }
  .subject-tab { padding:10px 22px; border-radius:20px; border:1px solid var(--border); background:var(--surface); color:var(--text2); cursor:pointer; font-size:.85rem; font-weight:600; transition:all .2s; }
  .subject-tab:hover { border-color:var(--accent); color:var(--text); }
  .subject-tab.active { color:#060b18; border-color:transparent; }
  .subject-tab.all.active { background:var(--purple); }
  .subject-tab.ict.active { background:#38bdf8; }
  .subject-tab.chem.active { background:#4ade80; }
  .summary-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:24px; }
  .summary-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; text-align:center; }
  .summary-card .val { font-size:1.8rem; font-weight:800; }
  .summary-card .lbl { font-size:.72rem; color:var(--text2); margin-top:4px; }
  .charts-row { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px; }
  @media(max-width:700px){ .charts-row { grid-template-columns:1fr; } }
  .chart-box { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; text-align:center; }
  .chart-box h4 { font-size:.82rem; color:var(--accent); margin-bottom:12px; }
  .chart-legend { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-top:10px; }
  .chart-legend span { font-size:.65rem; padding:2px 8px; border-radius:8px; }
  .grade-badge { display:inline-block; padding:8px 24px; border-radius:20px; font-size:1.5rem; font-weight:900; text-align:center; }
  .grade-5s { background:linear-gradient(135deg,#4ade80,#38bdf8); color:#060b18; }
  .grade-5ss { background:linear-gradient(135deg,#fbbf24,#4ade80); color:#060b18; }
  .grade-5 { background:#c084fc; color:#060b18; }
  .grade-4 { background:#fb923c; color:#060b18; }
  .grade-3 { background:#fbbf24; color:#060b18; }
  .grade-2 { background:#4ade80; color:#060b18; }
  .grade-1 { background:#f87171; color:#fff; }
  .detail-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); }
  .detail-row .d-icon { width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.72rem;flex-shrink:0; }
  .detail-row .d-info { flex:1; min-width:0; }
  .detail-row .d-name { font-size:.82rem; font-weight:600; }
  .detail-row .d-bar-wrap { height:8px; background:var(--surface2); border-radius:4px; overflow:hidden; margin:4px 0; }
  .detail-row .d-bar { height:100%; border-radius:4px; transition:width .5s; }
  .detail-row .d-stats { display:flex; gap:12px; font-size:.7rem; color:var(--text2); white-space:nowrap; }
  .detail-row .d-level { padding:3px 10px; border-radius:10px; font-size:.68rem; font-weight:700; white-space:nowrap; }
  .auth-msg { text-align:center; padding:48px 20px; color:var(--text2); }
  .auth-msg button { margin-top:12px; padding:10px 24px; border-radius:20px; background:var(--accent); color:#060b18; border:none; font-weight:600; cursor:pointer; font-size:.82rem; }
  ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-track { background:var(--bg); } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

@media(max-width:640px){
  .subject-grid{grid-template-columns:1fr!important;gap:10px}
  .subject-card{padding:14px!important}
  .card-grid{grid-template-columns:1fr!important}
  .container{padding:12px!important}
  header{padding:32px 16px 12px!important}
  header h1{font-size:1.4rem!important}
  header .subtitle{font-size:.8rem!important}
  .auth-bar{flex-wrap:wrap!important;gap:6px!important}
  .auth-bar button,.auth-bar a{font-size:.7rem!important;padding:6px 12px!important}
  .topbar{padding:10px 14px!important;gap:8px!important}
  .topbar h1{font-size:.85rem!important}
  .stats{grid-template-columns:repeat(2,1fr)!important;gap:8px}
  .stat{padding:12px!important}
  .stat .val{font-size:1.5rem!important}
  .filters{gap:4px!important}
  .filters button{padding:5px 10px!important;font-size:.68rem!important}
  .qcard .qhead{padding:10px 14px!important}
  .qcard .qtext{font-size:.82rem!important}
  .qcard .opt{padding:8px 12px!important;font-size:.78rem!important}
  .charts-row{grid-template-columns:1fr!important}
  .subject-tabs{gap:4px!important}
  .subject-tab{padding:8px 14px!important;font-size:.75rem!important}
  .summary-row{grid-template-columns:repeat(2,1fr)!important;gap:8px}
}

</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" title="返回平台">🏠</a>
  <h1>📊 學習進度</h1>
  <span style="font-size:.78rem;color:var(--text2);" id="userInfo"></span>
  <span style="margin-left:auto;"></span>
  <a href="index.html" style="padding:6px 14px;border-radius:16px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:.75rem;text-decoration:none;">⚙️ 設置</a>
  <button id="btnReset" onclick="resetProgress()" style="display:none;padding:6px 14px;border-radius:16px;border:1px solid var(--red);background:rgba(248,113,113,.08);color:var(--red);cursor:pointer;font-size:.72rem;">重設進度</button>
</div>

<div class="container">
  <div class="subject-tabs" id="subjectTabs">
    <button class="subject-tab all active" onclick="viewAll()">📋 全部科目</button>
    <button class="subject-tab ict" onclick="viewSubject('ict')">💻 資訊及通訊科技</button>
    <button class="subject-tab chem" onclick="viewSubject('chem')">⚗️ 化學</button>
  </div>
  <div class="summary-row" id="summaryRow"></div>
  <div class="charts-row">
    <div class="chart-box"><h4>🎯 掌握程度分佈</h4><canvas id="pieMastery" width="220" height="220"></canvas><div class="chart-legend" id="legendMastery"></div></div>
    <div class="chart-box"><h4>📊 課題答題量</h4><canvas id="pieTopics" width="220" height="220"></canvas><div class="chart-legend" id="legendTopics"></div></div>
  </div>
  <div id="detailContent"><p style="text-align:center;padding:40px;color:var(--text2);">載入中…</p></div>
</div>

<script>
var API = 'http://localhost/dse-ict-api/';
var TOKEN = localStorage.getItem('dse_platform_token');
var USER = JSON.parse(localStorage.getItem('dse_platform_user') || 'null');
var ALL = [];
var SUBJ = new URLSearchParams(window.location.search).get('subject') || null;

var SUB = {
  ict:{icon:'💻',name:'資訊及通訊科技',topics:{1:'資訊處理(一)',2:'資訊處理(二)',3:'電腦系統基礎',4:'互聯網及應用(一)',5:'互聯網及應用(二)',6:'計算思維與程式編寫(一)',7:'計算思維與程式編寫(二)',8:'社會影響'}},
  chem:{icon:'⚗️',name:'化學',topics:{1:'實驗室安全',2:'地球',3:'微觀世界I',4:'金屬',5:'酸和鹼',6:'化石燃料',7:'微觀世界II',8:'氧化還原',9:'化學能量學',10:'反應速率',11:'化學平衡',12:'碳化合物化學',13:'化學規律'}}
};
var LVL = {master:'大師',advanced:'進階',proficient:'熟練',developing:'成長中',novice:'初學',new:'全新'};
var CLR = {master:'#4ade80',advanced:'#38bdf8',proficient:'#c084fc',developing:'#fbbf24',novice:'#fb923c',new:'#f87171'};

(function init(){
  document.getElementById('userInfo').textContent = USER ? '👤 '+USER.username : '(未登入)';
  if(!TOKEN||!USER){
    document.getElementById('detailContent').innerHTML = '<div class="auth-msg"><p>請先登入以查看學習進度</p><p style="font-size:.7rem;color:var(--text2);margin-top:8px;">Token: '+(TOKEN?'OK('+TOKEN.length+' chars)':'MISSING')+' | User: '+(USER?USER.username:'MISSING')+'</p><button onclick="location.href=\'index.html\'">前往登入</button></div>';
    return;
  }
  if(SUBJ){ document.querySelector('.subject-tab.all').classList.remove('active'); document.querySelector('.subject-tab.'+SUBJ).classList.add('active'); }
  load();
})();

async function load(){
  try {
    var r = await fetch(API+'get-progress.php',{headers:{'Authorization':'Bearer '+TOKEN}});
    if(r.status===401){ localStorage.clear(); location.href='index.html'; return; }
    var d = await r.json();
    ALL = d.progress||[];
    if(SUBJ) renderSubject(SUBJ); else viewAll();
  }catch(e){
    document.getElementById('detailContent').innerHTML = '<div class="auth-msg"><p style="color:var(--red);">無法連接伺服器</p><p style="font-size:.78rem;">'+e.message+'</p></div>';
  }
}

function setTab(id){
  document.querySelectorAll('.subject-tab').forEach(function(t){t.classList.remove('active');});
  document.querySelector('.subject-tab.'+id).classList.add('active');
}

function viewAll(){ setTab('all'); renderAll(); }
function viewSubject(s){ setTab(s); renderSubject(s); }

function predictGrade(pct){
  if(pct>=88) return {g:'5**',c:'grade-5s'};
  if(pct>=82) return {g:'5*',c:'grade-5ss'};
  if(pct>=74) return {g:'5',c:'grade-5'};
  if(pct>=62) return {g:'4',c:'grade-4'};
  if(pct>=50) return {g:'3',c:'grade-3'};
  if(pct>=38) return {g:'2',c:'grade-2'};
  return {g:'1',c:'grade-1'};
}

function renderAll(){
  var ta=0,tc=0; ALL.forEach(function(p){ta+=p.total_attempted;tc+=p.total_correct;});
  var pct = ta>0?Math.round(tc/ta*100):0;
  var b5 = calcBest5();
  var b5html = b5.count>0 ?
    '<div class="summary-card"><div class="val" style="color:var(--yellow);">'+b5.total+'</div><div class="lbl">預測Best5</div></div>' :
    '<div class="summary-card"><div class="val" style="color:var(--text2);">—</div><div class="lbl">預測Best5</div></div>';
  document.getElementById('summaryRow').innerHTML =
    b5html +
    '<div class="summary-card"><div class="val" style="color:var(--accent);">'+ta+'</div><div class="lbl">總答題</div></div>'+
    '<div class="summary-card"><div class="val" style="color:var(--green);">'+tc+'</div><div class="lbl">正確</div></div>'+
    '<div class="summary-card"><div class="val" style="color:var(--red);">'+(ta-tc)+'</div><div class="lbl">錯誤</div></div>'+
    '<div class="summary-card"><div class="val" style="color:var(--yellow);">'+pct+'%</div><div class="lbl">正確率</div></div>';
  var h='';
  for(var s in SUB){
    var items = ALL.filter(function(p){return (p.subject||'ict')===s;});
    if(!items.length) continue;
    h+='<h3 style="color:var(--accent);margin-top:20px;margin-bottom:12px;">'+SUB[s].icon+' '+SUB[s].name+'</h3>';
    items.forEach(function(p){ h+=row(p,SUB[s]); });
  }
  if(!h) h='<p style="text-align:center;padding:40px;color:var(--text2);">尚未有答題記錄</p>';
  document.getElementById('detailContent').innerHTML = h;
  document.querySelector('.charts-row').style.display = 'none';
  document.getElementById('btnReset').style.display = 'inline';
}

function renderSubject(s){
  var items = ALL.filter(function(p){return (p.subject||'ict')===s;});
  var si = SUB[s];
  var ta=0,tc=0; items.forEach(function(p){ta+=p.total_attempted;tc+=p.total_correct;});
  var pct = ta>0?Math.round(tc/ta*100):0;
  var g = predictGrade(pct);
  document.getElementById('summaryRow').innerHTML =
    '<div class="summary-card"><span class="grade-badge '+g.c+'">'+g.g+'</span><div class="lbl">預測等級</div></div>'+
    '<div class="summary-card"><div class="val" style="color:var(--accent);">'+ta+'</div><div class="lbl">總答題</div></div>'+
    '<div class="summary-card"><div class="val" style="color:var(--green);">'+tc+'</div><div class="lbl">正確</div></div>'+
    '<div class="summary-card"><div class="val" style="color:var(--red);">'+(ta-tc)+'</div><div class="lbl">錯誤</div></div>'+
    '<div class="summary-card"><div class="val" style="color:var(--yellow);">'+pct+'%</div><div class="lbl">正確率</div></div>';
  var h='';
  items.forEach(function(p){ h+=row(p,si); });
  if(!h) h='<p style="text-align:center;padding:40px;color:var(--text2);">尚未有'+si.name+'答題記錄</p>';
  document.getElementById('detailContent').innerHTML = h;
  drawMasteryPie(items);
  drawTopicsPie(items);
  document.querySelector('.charts-row').style.display = '';
  document.getElementById('btnReset').style.display = 'none';
}

function row(p,si){
  var pct = p.total_attempted>0?Math.round(p.total_correct/p.total_attempted*100):0;
  var lvl = p.mastery_level||'new';
  var c = CLR[lvl]||'#888';
  var name = (si.topics[p.topic]||'Topic '+p.topic);
  return '<div class="detail-row">'+
    '<div class="d-icon" style="background:'+c+'20;color:'+c+';">'+p.topic+'</div>'+
    '<div class="d-info"><div class="d-name">'+name+'</div>'+
    '<div class="d-bar-wrap"><div class="d-bar" style="width:'+Math.max(pct,5)+'%;background:'+c+';"></div></div>'+
    '<div class="d-stats">✅ '+p.total_correct+'  ❌ '+p.total_wrong+'  '+pct+'%</div></div>'+
    '<div class="d-level" style="background:'+c+'20;color:'+c+';">'+(LVL[lvl]||lvl)+'</div></div>';
}

function drawPie(cid, segs, lid){
  var c = document.getElementById(cid); if(!c) return;
  var ctx = c.getContext('2d');
  var cx=c.width/2,cy=c.height/2,r=Math.min(cx,cy)-10;
  ctx.clearRect(0,0,c.width,c.height);
  var total = segs.reduce(function(s,x){return s+x.value;},0);
  if(!total){
    ctx.fillStyle='#334155'; ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#8899b4';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.fillText('No data',cx,cy+4);
    return;
  }
  var angle = -Math.PI/2;
  segs.forEach(function(seg){
    var slice = seg.value/total*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,angle,angle+slice);ctx.closePath();
    ctx.fillStyle=seg.color;ctx.fill();
    ctx.strokeStyle='#0f1629';ctx.lineWidth=2;ctx.stroke();
    angle+=slice;
  });
  var leg = document.getElementById(lid);
  if(leg) leg.innerHTML = segs.map(function(s){return '<span style="background:'+s.color+'20;color:'+s.color+';">'+s.label+':'+s.value+'</span>';}).join('');
}

function drawMasteryPie(items){
  var cnt={master:0,advanced:0,proficient:0,developing:0,novice:0,new:0};
  items.forEach(function(p){var l=p.mastery_level||'new';if(cnt[l]!==undefined)cnt[l]++;});
  drawPie('pieMastery',Object.entries(cnt).filter(function(e){return e[1]>0;}).map(function(e){return{label:LVL[e[0]],value:e[1],color:CLR[e[0]]};}),'legendMastery');
}

function drawTopicsPie(items){
  drawPie('pieTopics',items.map(function(p){var pct=p.total_attempted>0?Math.round(p.total_correct/p.total_attempted*100):0;return{label:'T'+p.topic,value:p.total_attempted,color:'hsl('+(pct>80?120:pct>50?200:40)+',70%,55%)'};}).filter(function(s){return s.value>0;}),'legendTopics');
}

// ============ BEST5 + SETTINGS ============
var SCORE = {5:5,4:4,3:3,2:2,1:1,'5*':6,'5**':7}; // Standard DSE: Lv5=5 marks
var BEST5_CORES = ['中文','英文','數學']; // 3 scored cores (CSD is Pass/Fail only, not scored)

function getSettings(){
  try { return JSON.parse(localStorage.getItem('dse_settings')) || {}; } catch(e) { return {}; }
}
function saveSettings(s){ localStorage.setItem('dse_settings', JSON.stringify(s)); }



</script>
</body>
</html>
